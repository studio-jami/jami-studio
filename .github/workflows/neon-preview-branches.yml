name: Neon Preview Branches

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]

permissions:
  contents: read

# Map each Netlify site to its Neon project. When a PR opens, we create a Neon
# branch per project and set the site's NETLIFY_DATABASE_URL(_UNPOOLED) as a
# BRANCH-scoped value for the PR's head branch (context: branch). Netlify uses a
# branch-specific value for that branch's deploy previews and it takes
# precedence over the shared deploy-preview context value, so concurrent PRs on
# different branches never clobber each other. The framework reads
# NETLIFY_DATABASE_URL unchanged; the branch value is snapshotted into the
# deploy at build time and available to the function at runtime.
#
# On PR close we delete only this branch's value (not the whole variable, which
# other branches and production still use) and this PR's Neon branch.

env:
  NEON_API_KEY: ${{ secrets.NEON_API_KEY }}

jobs:
  create-branches:
    if: github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - template: analytics
            neon_project: dry-shadow-75673589
            netlify_site: ba983662-dac4-478d-a481-5079e67e4d33
          - template: brain
            neon_project: lingering-band-25891811
            netlify_site: af978d13-aa58-44f3-9b5c-f12568467079
          - template: calendar
            neon_project: super-fire-75593365
            netlify_site: 954fe53b-052e-4401-aac2-2e973e498af8
          - template: clips
            neon_project: aged-glitter-95425960
            netlify_site: 7e3f4fee-258d-4d16-9aaf-154a714e87e2
          - template: content
            neon_project: quiet-heart-51077706
            netlify_site: 5c2198f5-bee4-41c3-8a6d-4869f400eec2
          - template: forms
            neon_project: curly-glade-91979555
            netlify_site: aa0b2020-9983-4d6c-8fb0-65462f960fc4
          - template: mail
            neon_project: patient-cake-44789837
            netlify_site: dee98bb0-6143-4205-8c04-afe7bf83d5b5
          - template: plan
            neon_project: late-pine-39936033
            netlify_site: 9d0d7a73-385d-4da1-ba10-1581ffc4d413
          - template: slides
            neon_project: hidden-thunder-16834477
            netlify_site: fd5deb5b-5539-47e1-830c-e5fb5e105efd
    steps:
      - name: Create Neon branch
        uses: neondatabase/create-branch-action@fb620d43d4c565abaf088b848a4e28e5c4ea4d9c # v6
        id: neon
        with:
          project_id: ${{ matrix.neon_project }}
          branch_name: preview/pr-${{ github.event.number }}
          api_key: ${{ secrets.NEON_API_KEY }}

      - name: Set preview DB URLs on Netlify site
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NEON_DB_URL_POOLED: ${{ steps.neon.outputs.db_url_pooled }}
          NEON_DB_URL_UNPOOLED: ${{ steps.neon.outputs.db_url }}
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          SITE="${{ matrix.netlify_site }}"
          ACCT="${{ secrets.NETLIFY_ACCOUNT_ID }}"
          BASE="https://api.netlify.com/api/v1/accounts/$ACCT/env"
          AUTH="Authorization: Bearer $NETLIFY_AUTH_TOKEN"

          # Set the value for THIS PR's head branch (context: branch). Netlify
          # uses a branch-specific value for that branch's deploy previews and it
          # takes precedence over the shared deploy-preview context, so PRs on
          # different branches never overwrite each other. Connection strings are
          # credentials, so the vars are marked is_secret. curl returns 000 for
          # DNS/TLS/connectivity failures, so we treat only an explicit 2xx as
          # success — anything else (000 included) fails the step rather than
          # silently leaving the branch value unset.
          set_netlify_branch_env() {
            local key="$1" val="$2"
            local body patch_body http
            body=$(jq -n --arg k "$key" --arg v "$val" --arg br "$HEAD_BRANCH" \
              '[{"key":$k,"scopes":["builds","functions","runtime"],"is_secret":true,"values":[{"value":$v,"context":"branch","context_parameter":$br}]}]')
            patch_body=$(jq -n --arg v "$val" --arg br "$HEAD_BRANCH" \
              '{"value":$v,"context":"branch","context_parameter":$br}')

            http=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              -H "$AUTH" -H "Content-Type: application/json" \
              "$BASE?site_id=$SITE" -d "$body")
            if [[ ! "$http" =~ ^2[0-9][0-9]$ ]]; then
              http=$(curl -s -o /dev/null -w "%{http_code}" -X PATCH \
                -H "$AUTH" -H "Content-Type: application/json" \
                "$BASE/$key?site_id=$SITE" -d "$patch_body")
            fi
            if [[ ! "$http" =~ ^2[0-9][0-9]$ ]]; then
              echo "::error::Failed to set Netlify env $key (branch $HEAD_BRANCH) for site $SITE (HTTP $http)"
              exit 1
            fi
          }

          set_netlify_branch_env "NETLIFY_DATABASE_URL" "$NEON_DB_URL_POOLED"
          set_netlify_branch_env "NETLIFY_DATABASE_URL_UNPOOLED" "$NEON_DB_URL_UNPOOLED"

  delete-branches:
    if: github.event.action == 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - template: analytics
            neon_project: dry-shadow-75673589
            netlify_site: ba983662-dac4-478d-a481-5079e67e4d33
          - template: brain
            neon_project: lingering-band-25891811
            netlify_site: af978d13-aa58-44f3-9b5c-f12568467079
          - template: calendar
            neon_project: super-fire-75593365
            netlify_site: 954fe53b-052e-4401-aac2-2e973e498af8
          - template: clips
            neon_project: aged-glitter-95425960
            netlify_site: 7e3f4fee-258d-4d16-9aaf-154a714e87e2
          - template: content
            neon_project: quiet-heart-51077706
            netlify_site: 5c2198f5-bee4-41c3-8a6d-4869f400eec2
          - template: forms
            neon_project: curly-glade-91979555
            netlify_site: aa0b2020-9983-4d6c-8fb0-65462f960fc4
          - template: mail
            neon_project: patient-cake-44789837
            netlify_site: dee98bb0-6143-4205-8c04-afe7bf83d5b5
          - template: plan
            neon_project: late-pine-39936033
            netlify_site: 9d0d7a73-385d-4da1-ba10-1581ffc4d413
          - template: slides
            neon_project: hidden-thunder-16834477
            netlify_site: fd5deb5b-5539-47e1-830c-e5fb5e105efd
    steps:
      - name: Delete Neon branch
        uses: neondatabase/delete-branch-action@4468d825d5a88ef4012f1705a82f02ec3072f776 # v3
        with:
          project_id: ${{ matrix.neon_project }}
          branch: preview/pr-${{ github.event.number }}
          api_key: ${{ secrets.NEON_API_KEY }}

      - name: Remove preview DB URL branch overrides
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          SITE="${{ matrix.netlify_site }}"
          ACCT="${{ secrets.NETLIFY_ACCOUNT_ID }}"
          BASE="https://api.netlify.com/api/v1/accounts/$ACCT/env"
          AUTH="Authorization: Bearer $NETLIFY_AUTH_TOKEN"

          # Delete only THIS branch's value, never the whole variable (other
          # branches and production still use it). Look up the branch-scoped
          # value's id, then delete that single value. curl's 000
          # transport-failure code and any non-2xx/404 fail the step.
          delete_netlify_branch_value() {
            local key="$1"
            local resp http body id
            resp=$(curl -s -w $'\n%{http_code}' -H "$AUTH" "$BASE/$key?site_id=$SITE")
            http=$(printf '%s' "$resp" | tail -n1)
            body=$(printf '%s' "$resp" | sed '$d')
            if [[ "$http" == "404" ]]; then return 0; fi
            if [[ ! "$http" =~ ^2[0-9][0-9]$ ]]; then
              echo "::error::Failed to read Netlify env $key for site $SITE (HTTP $http)"
              exit 1
            fi
            id=$(printf '%s' "$body" | jq -r --arg br "$HEAD_BRANCH" \
              'first(.values[]? | select(.context=="branch" and .context_parameter==$br) | .id) // empty')
            if [[ -z "$id" ]]; then return 0; fi
            http=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE \
              -H "$AUTH" "$BASE/$key/value/$id?site_id=$SITE")
            if [[ ! "$http" =~ ^(2[0-9][0-9]|404)$ ]]; then
              echo "::error::Failed to delete Netlify env $key branch value (branch $HEAD_BRANCH) for site $SITE (HTTP $http)"
              exit 1
            fi
          }

          delete_netlify_branch_value "NETLIFY_DATABASE_URL"
          delete_netlify_branch_value "NETLIFY_DATABASE_URL_UNPOOLED"
