appId: com.agentnative.desktop
productName: Agent Native

directories:
  buildResources: build
  output: dist

files:
  - out/**
  - "!node_modules/**"
  - "!src/**"
  - "!shared/**"
  - "!electron.vite.config.*"
  - "!{.env,.env.*,.npmrc,pnpm-lock.yaml}"
  - "!{tsconfig.json,tsconfig.*.json}"

extraResources:
  - from: native/bin/agent-native-computer-helper
    to: native/agent-native-computer-helper
  - from: ../agent-chrome-extension/dist
    to: chrome-extension
  - from: build/Assets.car
    to: Assets.car

protocols:
  - name: Agent Native
    schemes:
      - agentnative

mac:
  category: public.app-category.developer-tools
  identity: "Builder.io, Inc (W3PMF2T3MW)"
  icon: build/icon.icns
  extendInfo:
    CFBundleIconName: agent-native
    NSMicrophoneUsageDescription: Agent Native uses your microphone for dictation and realtime voice conversations.
  notarize: true
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64

dmg:
  artifactName: ${productName}-${arch}.${ext}

win:
  icon: build/icon.png
  target:
    - target: nsis
      arch:
        - x64
        - arm64
  artifactName: ${productName}-${arch}.${ext}

nsis:
  oneClick: true
  perMachine: false

linux:
  executableName: agent-native
  icon: build/icon.png
  target:
    - target: tar.xz
      arch:
        - x64
        - arm64
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
        - arm64
  category: Development
  artifactName: ${productName}-${arch}.${ext}

publish:
  provider: github
  owner: BuilderIO
  repo: agent-native

npmRebuild: false
