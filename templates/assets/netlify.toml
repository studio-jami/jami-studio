[build]
ignore = "node ./deploy/netlify/netlify-ignore-build.mjs assets"
command = "export DATABASE_URL=${NETLIFY_DATABASE_URL:-$DATABASE_URL} && pnpm install && NITRO_PRESET=netlify pnpm --filter assets build"
publish = "templates/assets/dist"
functions = "templates/assets/.netlify/functions-internal"

[build.environment]
GA_MEASUREMENT_ID = ""
NITRO_PRESET = "netlify"
NPM_CONFIG_PRODUCTION = "false"
AGENT_CHAT_DURABLE_BACKGROUND = "true"

# Emit the Netlify background function used by Assets' durable agent-chat opt-in.
# The normal server timeout still protects non-agent image/video HTTP handlers.
[functions."*"]
timeout = 300
