<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clips Extension Settings</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="options-page">
    <main class="options-shell">
      <header class="options-header">
        <div class="brand-mark" aria-hidden="true">C</div>
        <div>
          <p class="eyebrow">Clips extension</p>
          <h1>Settings</h1>
        </div>
      </header>

      <form id="settings-form" class="settings-form">
        <label class="field">
          <span class="field-label">Clips app URL</span>
          <input
            id="clips-base-url"
            type="url"
            inputmode="url"
            placeholder="https://clips.agent-native.com"
            autocomplete="off"
          />
          <span class="field-help">
            Use localhost here when testing a local Clips app.
          </span>
        </label>

        <label class="field">
          <span class="field-label">Default capture</span>
          <select id="capture-surface">
            <option value="browser">Current tab</option>
            <option value="window">Window</option>
            <option value="monitor">Screen</option>
            <option value="camera">Camera only</option>
          </select>
        </label>

        <label class="toggle-row" for="include-camera">
          <span>
            <span class="toggle-title">Camera bubble by default</span>
            <span class="toggle-subtitle">
              Applies to tab, window, and screen recordings.
            </span>
          </span>
          <input id="include-camera" type="checkbox" role="switch" />
        </label>

        <label class="toggle-row" for="include-developer-logs">
          <span>
            <span class="toggle-title">Developer logs by default</span>
            <span class="toggle-subtitle">
              Captures redacted console logs plus fetch/XHR method, URL, status,
              and duration from the tab you launched from.
            </span>
          </span>
          <input id="include-developer-logs" type="checkbox" role="switch" />
        </label>

        <div class="form-actions">
          <button id="reset" class="secondary-action" type="button">
            Restore defaults
          </button>
          <button class="primary-action" type="submit">Save settings</button>
        </div>

        <p id="status" class="status" role="status" aria-live="polite"></p>
      </form>
    </main>

    <script type="module" src="./options.ts"></script>
  </body>
</html>
