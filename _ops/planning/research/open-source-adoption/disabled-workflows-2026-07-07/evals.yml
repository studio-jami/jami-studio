name: Gated evals

on:
  workflow_dispatch:
    inputs:
      suite:
        description: Eval suite to run
        type: choice
        required: true
        default: content-parity
        options:
          - content-parity
          - brain
          - all
  schedule:
    # Nightly UTC check. Suites without configured secrets report skipped.
    - cron: "0 9 * * *"

concurrency:
  group: gated-evals-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  gated-evals:
    name: Gated evals
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Restore dist + tsBuildInfo cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            packages/*/dist
            packages/*/node_modules/.cache/tsbuildinfo
          key: dist-${{ hashFiles('packages/*/src/**', 'pnpm-lock.yaml') }}
          restore-keys: dist-

      - run: pnpm install --frozen-lockfile

      - name: Run requested eval suites
        shell: bash
        run: |
          set -euo pipefail

          suite="${{ inputs.suite || 'all' }}"
          echo "## Gated evals" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Requested suite: \`$suite\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          wants() {
            [[ "$suite" == "all" || "$suite" == "$1" ]]
          }

          append_eval_summary() {
            local title="$1"
            local file="$2"
            node - "$title" "$file" "$GITHUB_STEP_SUMMARY" <<'NODE'
          const fs = require("fs");
          const [title, file, summaryPath] = process.argv.slice(2);
          const data = JSON.parse(fs.readFileSync(file, "utf8"));
          const report = data.report ?? { total: 0, passed: 0, failed: 0, skipped: 0, results: [] };
          const skipped = report.skipped ?? report.results.filter((row) => row.status === "skipped").length;
          const executed = report.total - skipped;
          const executedPassed = report.passed - skipped;
          const status = executed === 0 && skipped > 0 ? "SKIPPED" : data.ok ? "PASS" : "FAIL";
          const lines = [
            `### ${title}`,
            "",
            `Status: ${status}`,
            "",
            `Executed: ${executedPassed}/${executed} passed; skipped: ${skipped}; failed: ${report.failed}.`,
            "",
          ];
          for (const row of report.results) {
            if (row.status === "skipped") {
              lines.push(`- ${row.eval}: skipped (${row.skipReason ?? "no reason"})`);
            } else {
              lines.push(`- ${row.eval}: ${row.passed ? "passed" : "failed"}`);
            }
          }
          lines.push("");
          fs.appendFileSync(summaryPath, `${lines.join("\n")}\n`);
          NODE
          }

          if wants content-parity; then
            echo "Running Content parity eval suite"
            if [[ -n "${ANTHROPIC_API_KEY:-}${OPENAI_API_KEY:-}${OPENROUTER_API_KEY:-}" ]]; then
              export CONTENT_PARITY_EVALS=1
            else
              unset CONTENT_PARITY_EVALS || true
              echo "Content parity provider secrets are not configured; suite should report skipped rows."
            fi
            (
              cd templates/content
              ./node_modules/.bin/agent-native eval parity --json
            ) | tee content-parity-evals.json
            append_eval_summary "Content parity" content-parity-evals.json
          fi

          if wants brain; then
            echo "Running Brain deterministic action evals"
            pnpm test:brain-evals
            {
              echo "### Brain"
              echo ""
              echo "Status: PASS"
              echo ""
              echo "The existing Brain eval command is action/fixture based and remains classified as deterministic in this PR."
              echo ""
            } >> "$GITHUB_STEP_SUMMARY"
          fi
